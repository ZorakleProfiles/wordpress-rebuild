version: "3.9"

services:
  astro:
    image: astro-dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - ./site:/app/site
      - /app/site/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - zorakle-new_sail
networks:
  zorakle-new_sail:
    external: true

